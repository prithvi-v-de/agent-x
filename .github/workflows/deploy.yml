name: Build & Deploy to App Runner

on:
  push:
    branches: [main]
  workflow_dispatch:  

env:
  AWS_REGION: us-east-2
  ECR_REPO: agent-x
  APP_RUNNER_SERVICE: agent-x

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Log into AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. Log into ECR
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Build and push Docker image
      - name: Build, tag, push image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPO:latest
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:latest
          echo "Image pushed: $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG"

      # 5. Trigger App Runner to redeploy
      - name: Deploy to App Runner
        run: |
          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='$APP_RUNNER_SERVICE'].ServiceArn" \
            --output text)

          if [ -z "$SERVICE_ARN" ] || [ "$SERVICE_ARN" = "None" ]; then
            echo "ERROR: App Runner service '$APP_RUNNER_SERVICE' not found."
            echo "Create it first via the AWS Console (see README)."
            exit 1
          fi

          echo "Triggering deployment for: $SERVICE_ARN"
          aws apprunner start-deployment --service-arn "$SERVICE_ARN"
          echo "Deployment triggered. Check App Runner console for status."
